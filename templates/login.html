<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Inline check so logged in users go straight to dashboard -->
    <script>
        if(localStorage.getItem('token')) {
            if(localStorage.getItem('role') === 'student') {
                window.location.href = '/student_dashboard';
            } else {
                window.location.href = '/dashboard';
            }
        }
    </script>
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/" class="logo"><i class="fa-solid fa-graduation-cap"></i> SmartSys</a>
        </div>
    </nav>

    <div class="auth-wrapper animated">
        <div class="auth-card">
            <h2 class="auth-title">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="admin123">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
                Student Mock: <b>student</b> / <b>student123</b><br>
                Admin Mock: <b>admin</b> / <b>admin123</b>
            </p>
            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
                Don't have an account? <a href="/signup" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">Sign up here</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
