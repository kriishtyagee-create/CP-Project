<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Face | Smart Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body onload="checkAuth();">
    <nav>
        <div class="container nav-container">
            <a href="/" class="logo"><i class="fa-solid fa-graduation-cap"></i> SmartSys Dashboard</a>
            <ul class="nav-links" style="align-items: center;">
                <li><a href="/dashboard">Overview</a></li>
                <li><a href="/mark">Mark Attendance</a></li>
                <li><a href="/register_face_page" style="color:var(--primary-color)">Register Face</a></li>
                <li><a href="/recognize_page">Live Recognition</a></li>
                <li><a href="/reports">Reports</a></li>
                <li><button id="logout-btn" class="btn btn-outline" style="padding: 0.3rem 0.8rem;"><i class="fa-solid fa-sign-out-alt"></i> Logout</button></li>
            </ul>
        </div>
    </nav>

    <main class="container animated auth-wrapper mt-2" style="min-height: auto; align-items: start; padding-top: 2rem;">
        <div class="auth-card" style="max-width: 600px; width: 100%;">
            <h2 class="auth-title">Register New Face</h2>
            
            <form id="register-face-form">
                <div class="form-group">
                    <label for="student_name">Student Full Name</label>
                    <input type="text" id="student_name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="roll_number">Roll Number</label>
                    <input type="text" id="roll_number" class="form-control" required placeholder="CS101">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="capture-btn">
                    <i class="fa-solid fa-camera"></i> Capture Base Images
                </button>
            </form>
            
            <hr style="margin: 2rem 0; border: none; border-top: 1px solid #ddd;">
            <p>Once you are done registering faces, click here to train the system model over new faces.</p>
            <button onclick="trainModel()" class="btn btn-outline" style="width: 100%; background: var(--success); color: white; border: none;" id="train-btn">
                <i class="fa-solid fa-brain"></i> Train Model
            </button>
        </div>
    </main>

    <script>
        document.getElementById('register-face-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('capture-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Capturing (Looking at Webcam)...';
            btn.disabled = true;

            const student_name = document.getElementById('student_name').value;
            const roll_number = document.getElementById('roll_number').value;

            try {
                const response = await fetch('/api/register_face', {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({student_name, roll_number})
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Faces captured successfully!');
                    document.getElementById('register-face-form').reset();
                } else {
                    showToast(data.message || 'Error capturing faces');
                }
            } catch (err) {
                showToast('Server error');
            }

            btn.innerHTML = '<i class="fa-solid fa-camera"></i> Capture Base Images';
            btn.disabled = false;
        });

        async function trainModel() {
            const btn = document.getElementById('train-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Training Model...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/train_model', {
                    method: 'POST',
                    headers: getAuthHeaders()
                });
                const data = await response.json();
                if (response.ok) {
                    showToast('Model training complete!');
                } else {
                    showToast(data.message || 'Error training model');
                }
            } catch (err) {
                showToast('Server error');
            }
            
            btn.innerHTML = '<i class="fa-solid fa-brain"></i> Train Model';
            btn.disabled = false;
        }
    </script>
</body>
</html>
