<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark Attendance | Smart Attendance System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/student_dashboard" class="logo"><i class="fa-solid fa-graduation-cap"></i> SmartSys</a>
            <ul class="nav-links">
                <li><a href="/student_dashboard"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="#" id="logout-btn" class="btn btn-outline" style="padding: 0.3rem 0.8rem;">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container animated" style="margin-top: 2rem;">
        <div class="text-center">
            <h2 class="section-title" style="margin-top:0;">Face Verification</h2>
            <p class="text-muted">Ensure your face is clearly visible in the camera before scanning.</p>
        </div>

        <div class="camera-container">
            <video id="webcam" autoplay playsinline></video>
            <!-- Hidden canvas to grab snapshot -->
            <canvas id="canvas" style="display: none;"></canvas>
        </div>
        
        <div class="camera-controls">
            <button id="scan-btn" class="btn btn-primary" style="font-size: 1.1rem; padding: 1rem 2rem; width: 100%;">
                <i class="fa-solid fa-expand"></i> Scan Face & Mark Attendance
            </button>
        </div>
        <div style="text-align: center; margin-top: 1rem;">
             <a href="/student_dashboard" style="color:var(--text-muted); text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            if (localStorage.getItem('role') !== 'student') {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
